<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>我的好友類型分佈</title>
<script src="./runtime-config.js"></script>
<script src="./line-liff.js"></script>
<script src="./tracking.js"></script>
<script src="./data/archetypes.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<link href="./alpha-app.css" rel="stylesheet">
<style>
  body { margin:0; background:#050409; color:#fff; font-family:'Noto Sans TC','Microsoft JhengHei',sans-serif; -webkit-font-smoothing:antialiased; }
  .page-shell { position:relative; width:100%; max-width:390px; height:100dvh; margin:0 auto; overflow:hidden; background:#070510; }
  .page-bg, .page-bg::before, .page-bg::after { position:absolute; inset:0; content:""; pointer-events:none; }
  .page-bg { background:radial-gradient(150% 70% at 50% -12%, rgba(153,96,255,.34), transparent 60%), radial-gradient(90% 60% at 92% 68%, rgba(38,190,190,.22), transparent 62%); }
  .page-bg::before { opacity:.45; background-image:radial-gradient(rgba(255,255,255,.06) 1px, transparent 1px); background-size:3px 3px; }
  .page-bg::after { background:radial-gradient(120% 90% at 50% 50%, transparent 46%, rgba(0,0,0,.58) 100%); }
  .scroll { position:absolute; inset:0; overflow-y:auto; overflow-x:hidden; -webkit-overflow-scrolling:touch; padding:54px 24px 34px; box-sizing:border-box; }
  .eyebrow { font-family:'Space Grotesk',Arial,sans-serif; font-size:11.5px; letter-spacing:.2em; color:#cba6ff; font-weight:700; }
  .title { margin-top:12px; font-size:34px; font-weight:950; line-height:1.12; letter-spacing:0; }
  .copy { margin-top:9px; font-size:14px; line-height:1.75; color:rgba(255,255,255,.58); }
  .panel { margin-top:20px; border-radius:24px; border:1px solid rgba(255,255,255,.11); background:linear-gradient(180deg, rgba(255,255,255,.09), rgba(255,255,255,.035)); box-shadow:0 22px 64px rgba(0,0,0,.36); overflow:hidden; }
  .panel-inner { padding:18px; }
  .hero { display:flex; align-items:center; gap:14px; }
  .avatar-ring { flex:0 0 auto; width:84px; height:84px; border-radius:50%; border:1px solid rgba(214,174,91,.7); background:linear-gradient(145deg,#fffdf8,#efe8d8); padding:4px; box-shadow:0 0 34px rgba(214,174,91,.25); }
  .avatar-ring img { width:100%; height:100%; object-fit:cover; border-radius:50%; display:block; }
  .avatar-fallback { width:100%; height:100%; border-radius:50%; display:grid; place-items:center; color:#15120c; font-size:24px; font-weight:900; background:#fffdf8; }
  .metric-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:9px; margin-top:15px; }
  .metric { min-width:0; border-radius:15px; border:1px solid rgba(255,255,255,.1); background:rgba(0,0,0,.18); padding:10px 7px; text-align:center; }
  .metric b { display:block; font-family:'Space Grotesk',Arial,sans-serif; font-size:21px; line-height:1; }
  .metric span { display:block; margin-top:5px; font-size:11px; color:rgba(255,255,255,.46); white-space:nowrap; }
  .section-title { margin-top:30px; font-size:13px; letter-spacing:.08em; color:rgba(255,255,255,.52); font-weight:900; }
  .row-list { display:flex; flex-direction:column; gap:10px; margin-top:12px; }
  .type-row { border-radius:17px; border:1px solid rgba(255,255,255,.1); background:rgba(255,255,255,.045); padding:12px 13px; }
  .type-head { display:flex; align-items:center; justify-content:space-between; gap:10px; }
  .type-name { display:flex; align-items:center; gap:10px; min-width:0; font-weight:900; }
  .crest-mini { width:38px; height:38px; flex:0 0 auto; border-radius:12px; border:1px solid rgba(214,174,91,.5); background:linear-gradient(180deg,#fffdf8,#f4efe4); padding:3px; box-shadow:0 0 16px var(--glow); }
  .crest-mini img { width:100%; height:100%; object-fit:contain; display:block; border-radius:9px; }
  .type-count { flex:0 0 auto; font-size:13px; font-weight:900; color:var(--color); padding:5px 11px; border-radius:999px; border:1px solid var(--ring); background:rgba(255,255,255,.04); }
  .bar { height:7px; border-radius:999px; background:rgba(255,255,255,.08); margin-top:10px; overflow:hidden; }
  .bar > span { display:block; height:100%; width:var(--w); border-radius:999px; background:linear-gradient(90deg, var(--color), rgba(255,255,255,.75)); box-shadow:0 0 12px var(--glow); }
  .friend-grid { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:10px; margin-top:12px; }
  .friend-card { min-width:0; border-radius:18px; border:1px solid rgba(255,255,255,.09); background:rgba(255,255,255,.045); padding:10px 7px 9px; text-align:center; overflow:hidden; }
  .friend-photo { width:58px; height:58px; margin:0 auto; border-radius:50%; border:1px solid rgba(214,174,91,.52); background:rgba(255,255,255,.08); overflow:hidden; box-shadow:0 0 18px var(--glow); }
  .friend-photo img { width:100%; height:100%; object-fit:cover; display:block; }
  .friend-name { margin-top:8px; font-size:13px; font-weight:900; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .friend-type { margin-top:3px; font-size:10.5px; color:var(--color); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .status-pill { display:inline-flex; margin-top:6px; padding:3px 7px; border-radius:999px; background:rgba(255,255,255,.075); color:rgba(255,255,255,.56); font-size:10px; }
  .mutual-pill { display:inline-flex; margin-top:5px; padding:3px 7px; border-radius:999px; border:1px solid rgba(214,174,91,.24); background:rgba(214,174,91,.11); color:#d6ae5b; font-size:10px; font-weight:900; }
  .empty { margin-top:12px; border-radius:22px; border:1px dashed rgba(255,255,255,.2); background:rgba(255,255,255,.035); padding:22px 18px; text-align:center; }
  .empty strong { display:block; font-size:18px; line-height:1.4; }
  .empty span { display:block; margin-top:8px; font-size:13px; line-height:1.7; color:rgba(255,255,255,.56); }
  .button { width:100%; height:56px; border-radius:999px; border:1px solid rgba(255,255,255,.2); cursor:pointer; font-family:inherit; font-size:16px; font-weight:950; color:#fff; }
  .button.primary { background:linear-gradient(100deg,#8758ff,#d94fa8,#4e9fff); box-shadow:0 15px 44px rgba(121,89,255,.3); }
  .button.secondary { background:rgba(255,255,255,.06); margin-top:12px; color:rgba(255,255,255,.9); }
  .link-button { display:block; width:100%; margin-top:16px; border:0; background:transparent; color:rgba(255,255,255,.46); font-family:inherit; font-size:13px; cursor:pointer; }
  .toast { position:absolute; left:24px; right:24px; bottom:28px; z-index:10; padding:15px 18px; border-radius:18px; border:1px solid rgba(255,255,255,.16); background:rgba(12,10,24,.94); box-shadow:0 14px 36px rgba(0,0,0,.45); text-align:center; font-size:14px; line-height:1.55; color:rgba(255,255,255,.92); }
</style>
</head>
<body>
<div class="page-shell">
  <div class="page-bg"></div>
  <main id="app" class="scroll"></main>
</div>
<script>
(function () {
  const app = document.getElementById('app');
  const arch = window.AI_SURVIVAL_ARCHETYPE_MAP || {};
  let state = { loading: true, error: '', data: null };
  let toastTimer = null;
  let shareBusy = false;

  const statusCopy = {
    compass: '已找到方向',
    oriented: '想解鎖報告',
    archetyped: '已完成測驗',
    unknown: '剛加入',
  };

  function apiBase() {
    return (localStorage.getItem('AI_SURVIVAL_API_BASE_URL') || window.AI_SURVIVAL_API_BASE_URL || 'https://ai-survivalapi-production.up.railway.app').replace(/\/$/, '');
  }

  function profileHeaders() {
    return {
      'X-Line-User-Id': localStorage.getItem('AI_SURVIVAL_LINE_USER_ID') || '',
      'X-Line-Display-Name': localStorage.getItem('AI_SURVIVAL_LINE_DISPLAY_NAME') || '',
      'X-Line-Picture-Url': localStorage.getItem('AI_SURVIVAL_LINE_PICTURE_URL') || '',
    };
  }

  function getType(key) {
    const item = arch[key] || arch.explorer || { name: 'AI探險家', n: '01', hue: 288 };
    const hue = item.hue || item.colorHue || 288;
    return {
      key: key || 'explorer',
      name: item.name || 'AI探險家',
      shortName: (item.name || 'AI探險家').replace(/^AI/, ''),
      n: item.n || item.id || '01',
      portraitPath: item.imagePaths?.portrait || `./assets/archetypes/${key || 'explorer'}.png`,
      color: `oklch(0.8 0.15 ${hue})`,
      ring: `oklch(0.78 0.16 ${hue} / 0.55)`,
      glow: `oklch(0.7 0.18 ${hue} / 0.4)`,
    };
  }

  function escapeHtml(text) {
    return String(text || '').replace(/[&<>"']/g, (m) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' }[m]));
  }

  function ownerDisplayName() {
    return localStorage.getItem('AI_SURVIVAL_LINE_DISPLAY_NAME') || state.data?.owner?.display_name || '你';
  }

  function ownerPictureUrl() {
    return localStorage.getItem('AI_SURVIVAL_LINE_PICTURE_URL') || state.data?.owner?.picture_url || '';
  }

  function render() {
    if (state.loading) {
      app.innerHTML = `
        <div class="eyebrow">FRIEND TYPES</div>
        <div class="title">正在讀取好友類型分佈</div>
        <div class="copy">會依照透過你分享連結進來、並登入或完成測驗的朋友即時更新。</div>
        <div class="panel"><div class="panel-inner">同步 LINE 資料中...</div></div>
      `;
      return;
    }

    const data = state.data || { friends: [], distribution: [], totals: {} };
    const friends = data.friends || [];
    const totals = data.totals || {};
    const withResult = totals.withResult || 0;
    const distribution = data.distribution || [];

    app.innerHTML = `
      <div class="eyebrow">FRIEND TYPES</div>
      <div class="title">我的好友類型分佈</div>
      <div class="copy">這裡只顯示透過你的分享連結進來，並完成登入或測驗的好友。LINE 不會直接提供完整好友名單。</div>

      <section class="panel">
        <div class="panel-inner">
          <div class="hero">
            <div class="avatar-ring">${avatar(ownerPictureUrl(), ownerDisplayName())}</div>
            <div style="min-width:0;">
              <div style="font-size:12px; letter-spacing:.14em; color:rgba(255,255,255,.54); font-weight:900;">你的分享圈</div>
              <div style="margin-top:5px; font-size:24px; line-height:1.2; font-weight:950; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${escapeHtml(ownerDisplayName())}</div>
              <div style="margin-top:7px; font-size:13px; line-height:1.55; color:rgba(255,255,255,.58);">朋友點你的連結登入後，頭像就會出現在下面。</div>
            </div>
          </div>
          <div class="metric-grid">
            <div class="metric"><b>${totals.friends || 0}</b><span>已加入</span></div>
            <div class="metric"><b>${withResult}</b><span>已測完</span></div>
            <div class="metric"><b>${totals.compass || 0}</b><span>有方向</span></div>
          </div>
        </div>
      </section>

      <div class="section-title">好友類型分佈</div>
      ${distribution.length ? `<div class="row-list">${distribution.map(typeRow).join('')}</div>` : emptyBlock('還沒有類型分佈', '當朋友完成測驗後，這裡會出現 AI 探險家、AI 工匠等好友類型比例。')}

      <div class="section-title">好友頭像</div>
      ${friends.length ? `<div class="friend-grid">${friends.map(friendCard).join('')}</div>` : emptyBlock('還沒有好友加入', '先把遊戲分享給朋友。朋友從你的連結登入後，頭像會真的出現在這裡。')}

      <div class="section-title">方向狀態</div>
      <section class="panel">
        <div class="panel-inner">
          <div class="metric-grid">
            <div class="metric"><b>${totals.compass || 0}</b><span>指南針</span></div>
            <div class="metric"><b>${totals.oriented || 0}</b><span>想解鎖</span></div>
            <div class="metric"><b>${totals.unknown || 0}</b><span>迷霧中</span></div>
          </div>
          <div class="copy">之後付費或解鎖深度報告的人，會移到「指南針」位置，形成更明確的方向感。</div>
        </div>
      </section>

      <div style="margin-top:30px;">
        <button class="button primary" data-action="share">分享遊戲給 LINE 好友</button>
        <button class="button secondary" data-action="future">開啟未來導航</button>
        <button class="link-button" data-action="refresh">重新整理好友分佈</button>
      </div>
    `;
    bind();
  }

  function avatar(src, name) {
    if (src) return `<img src="${escapeHtml(src)}" alt="${escapeHtml(name)}">`;
    return `<span class="avatar-fallback">${escapeHtml(String(name || '你').slice(0, 1))}</span>`;
  }

  function typeRow(row) {
    const type = getType(row.key);
    const total = Math.max(1, state.data?.totals?.withResult || 0);
    const percent = Math.round((row.count / total) * 100);
    return `
      <div class="type-row" style="--color:${type.color}; --ring:${type.ring}; --glow:${type.glow}; --w:${percent}%;">
        <div class="type-head">
          <div class="type-name"><span class="crest-mini"><img src="${type.portraitPath}" alt="${escapeHtml(type.name)}"></span><span>${escapeHtml(type.name)}</span></div>
          <span class="type-count">${row.count} 位</span>
        </div>
        <div class="bar"><span></span></div>
      </div>
    `;
  }

  function friendCard(friend) {
    const type = getType(friend.primaryType || 'explorer');
    return `
      <div class="friend-card" style="--color:${type.color}; --glow:${type.glow};">
        <div class="friend-photo">${avatar(friend.pictureUrl, friend.displayName || '好友')}</div>
        <div class="friend-name">${escapeHtml(friend.displayName || 'LINE 好友')}</div>
        <div class="friend-type">${escapeHtml(friend.primaryName || '尚未完成')}</div>
        <span class="status-pill">${escapeHtml(statusCopy[friend.status] || '已加入')}</span>
        <span class="mutual-pill">共同 ${Number(friend.mutualFriendCount || 0)} 位</span>
      </div>
    `;
  }

  function emptyBlock(title, copy) {
    return `<div class="empty"><strong>${escapeHtml(title)}</strong><span>${escapeHtml(copy)}</span></div>`;
  }

  function bind() {
    app.querySelectorAll('[data-action]').forEach((el) => {
      if (el.getAttribute('data-action') === 'share') {
        el.addEventListener('pointerdown', () => toast('正在準備分享...'), { passive: true });
      }
      el.addEventListener('click', async () => {
        const action = el.getAttribute('data-action');
        if (action === 'future') window.location.href = './未來導航.dc.html';
        if (action === 'refresh') load();
        if (action === 'share') shareGame('friend_distribution_page');
      });
    });
  }

  function toast(message) {
    clearTimeout(toastTimer);
    document.querySelector('.toast')?.remove();
    const el = document.createElement('div');
    el.className = 'toast';
    el.textContent = message;
    document.querySelector('.page-shell').appendChild(el);
    toastTimer = setTimeout(() => el.remove(), 2600);
  }

  async function shareGame(source) {
    if (shareBusy) {
      toast('分享視窗開啟中，請稍等...');
      return;
    }
    shareBusy = true;
    toast('正在開啟 LINE 好友清單...');
    window.AI_SURVIVAL_TRACK?.track?.('clicked_share', {
      metadata: {
        source,
        lineDiagnostics: window.AI_SURVIVAL_LINE?.getDiagnostics?.() || null
      }
    });
    try {
      if (!window.AI_SURVIVAL_LINE?.shareGame) throw new Error('LINE share is not initialized');
      const result = await window.AI_SURVIVAL_LINE.shareGame({
        profileId: localStorage.getItem('profileId'),
        title: 'AI 時代生存指數',
        text: '我正在看我的好友類型分佈。你也來測看看，在超智能時代你屬於哪個位置？',
      });
      if (!result?.fallback) toast('已打開 LINE 好友列表');
    } catch (error) {
      const fallbackUrl = await window.AI_SURVIVAL_LINE?.permanentGameUrl?.({
        profileId: localStorage.getItem('profileId'),
        source: `${source}_copy_fallback`,
      }) || window.AI_SURVIVAL_LINE?.gameUrl?.({ profileId: localStorage.getItem('profileId') }) || location.href;
      await navigator.clipboard?.writeText?.(fallbackUrl).catch(() => null);
      toast('目前無法開啟 LINE 好友列表，已改為複製分享連結');
    } finally {
      shareBusy = false;
    }
  }

  async function load() {
    state = { loading: true, error: '', data: null };
    render();
    await window.AI_SURVIVAL_LINE?.ready?.catch(() => null);
    const params = new URLSearchParams();
    const lineUserId = localStorage.getItem('AI_SURVIVAL_LINE_USER_ID');
    const profileId = localStorage.getItem('profileId');
    if (lineUserId && !lineUserId.startsWith('local-alpha-')) {
      params.set('lineUserId', lineUserId);
    } else if (profileId) {
      params.set('profileId', profileId);
    }

    try {
      const response = await fetch(`${apiBase()}/friends/wall?${params.toString()}`, {
        headers: profileHeaders(),
      });
      const data = await response.json();
      if (data?.owner?.id) {
        localStorage.setItem('profileId', data.owner.id);
        if (lineUserId) localStorage.setItem('AI_SURVIVAL_PROFILE_LINE_USER_ID', lineUserId);
      }
      state = { loading: false, error: '', data };
    } catch (error) {
      state = { loading: false, error: String(error?.message || error), data: { friends: [], distribution: [], totals: {} } };
      toast('好友類型分佈暫時讀取失敗');
    }
    render();
  }

  load();
})();
</script>
</body>
</html>
